<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TravelWear</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#ffffff;
  color:#111;
}

/* HEADER */
header {
  padding:30px 20px;
  text-align:center;
}

.logo {
  height:120px;
}

h1 {
  margin:10px 0 5px;
  font-size:28px;
  color:#ff3c00;
}

.slogan {
  color:#555;
  font-size:14px;
}

/* GRID */
.grid {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:25px;
  padding:30px 20px;
}

/* CARD */
.card {
  background:#fff;
  border-radius:12px;
  width:180px;
  overflow:hidden;
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
  transition:0.3s;
}

.card:hover {
  transform:translateY(-8px);
}

/* IMAGEM */
.card img {
  width:100%;
}

/* INFO */
.info {
  padding:15px;
}

.nome {
  font-size:14px;
  font-weight:bold;
  margin-bottom:5px;
}

.preco {
  color:#ff3c00;
  font-weight:bold;
  margin-bottom:10px;
}

/* BOTÃO */
.btn {
  padding:10px;
  background:#ff3c00;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
  width:100%;
  font-weight:bold;
}

.btn:hover {
  background:#e63600;
}

/* RESPONSIVO */
@media(min-width:768px){
  .card {
    width:240px;
  }
}
</style>

</head>

<body>

<header>
  <img src="logo.png" class="logo">
  <h1>TravelWear</h1>
  <p class="slogan">Cada camiseta um momento eternizado da viagem</p>
</header>

<section class="grid">

  <div class="card">
    <img src="camiseta1.png">
    <div class="info">
      <div class="nome">Camiseta Indonesia</div>
      <div class="preco">R$ 119,90</div>
      <a href="https://wa.me/5511942785956?text=Olá%20quero%20comprar%20a%20Camiseta%20Indonesia" target="_blank">
        <button class="btn">Comprar no WhatsApp</button>
      </a>
    </div>
  </div>

  <div class="card">
    <img src="camiseta2.png">
    <div class="info">
      <div class="nome">Camiseta Tailandia</div>
      <div class="preco">R$ 119,90</div>
      <a href="https://wa.me/5511942785956?text=Olá%20quero%20comprar%20a%20Camiseta%20Tailandia" target="_blank">
        <button class="btn">Comprar no WhatsApp</button>
      </a>
    </div>
  </div>

  <div class="card">
    <img src="camiseta3.png">
    <div class="info">
      <div class="nome">Camiseta Brasil</div>
      <div class="preco">R$ 119,90</div>
      <a href="https://wa.me/5511942785956?text=Olá%20quero%20comprar%20a%20Camiseta%20Rio" target="_blank">
        <button class="btn">Comprar no WhatsApp</button>
      </a>
    </div>
  </div>

</section>

</body>
</html>
